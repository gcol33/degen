on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        # `examples = FALSE` matches the local build pattern (see
        # ~/.R/build_pkgdown.R) and avoids the pkgdown 2.2.0 +
        # svglite 2.2.x interaction where pkgdown:::fig_save() sets
        # `dev.args$bg <- NA` and svglite rejects NA bg with
        # "Expected string vector of length 1". See
        # dev_notes/repro_pkgdown_svglite_bug.R for a minimal repro.
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE, examples = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
